name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  security-events: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test-publish:
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - name: Check out tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Validate tag and source version
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          [xml]$props = Get-Content .\Directory.Build.props -Raw
          $sourceVersion = [string]($props.Project.PropertyGroup | Select-Object -First 1).Version
          if ($version -notmatch '^\d+\.\d+\.\d+$' -or $version -ne $sourceVersion) {
            throw "Tag version '$version' does not match source version '$sourceVersion'."
          }
          "FLARE_RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Initialize CodeQL
        uses: github/codeql-action/init@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore .\FlareQuotes.App\FlareQuotes.App.csproj
          if ($LASTEXITCODE -ne 0) { throw "App restore failed." }
          dotnet restore .\FlareQuotes.Tests\FlareQuotes.Tests.csproj
          if ($LASTEXITCODE -ne 0) { throw "Test restore failed." }

      - name: Audit direct and transitive NuGet dependencies
        shell: pwsh
        run: |
          $projects = @(
            ".\FlareQuotes.App\FlareQuotes.App.csproj",
            ".\FlareQuotes.Tests\FlareQuotes.Tests.csproj"
          )
          foreach ($project in $projects) {
            $report = dotnet list $project package --vulnerable --include-transitive --format json --no-restore
            if ($LASTEXITCODE -ne 0) {
              throw "NuGet vulnerability audit failed for $project."
            }
            if (($report -join "`n") -match '"advisoryUrl"\s*:') {
              $report | Write-Host
              throw "A vulnerable NuGet package was detected in $project."
            }
          }

      - name: Build with warnings as errors
        run: dotnet build .\FlareQuotes.App\FlareQuotes.App.csproj -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Run automated tests
        run: dotnet test .\FlareQuotes.Tests\FlareQuotes.Tests.csproj -c Release --no-restore --filter "FullyQualifiedName!~GmailEveryModelIntegrationTests"

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4

      - name: Build installer and publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $notes = Get-Content .\RELEASE_NOTES.md -Raw
          .\Build_Publish_Professional_Release.ps1 `
            -Version $env:FLARE_RELEASE_VERSION `
            -ReleaseNotes $notes
