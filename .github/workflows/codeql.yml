name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-extended,security-and-quality
      - run: dotnet build .\FlareQuotes.App\FlareQuotes.App.csproj -c Release -p:TreatWarningsAsErrors=true
      - run: dotnet test .\FlareQuotes.Tests\FlareQuotes.Tests.csproj -c Release --filter "FullyQualifiedName!~GmailEveryModelIntegrationTests"
      - uses: github/codeql-action/analyze@v4
