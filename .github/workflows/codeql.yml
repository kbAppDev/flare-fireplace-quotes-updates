name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore .\FlareQuotes.App\FlareQuotes.App.csproj
          if ($LASTEXITCODE -ne 0) { throw "App restore failed." }
          dotnet restore .\FlareQuotes.Tests\FlareQuotes.Tests.csproj
          if ($LASTEXITCODE -ne 0) { throw "Test restore failed." }

      - name: Audit direct and transitive NuGet dependencies
        shell: pwsh
        run: |
          $projects = @(
            ".\FlareQuotes.App\FlareQuotes.App.csproj",
            ".\FlareQuotes.Tests\FlareQuotes.Tests.csproj"
          )
          foreach ($project in $projects) {
            $report = dotnet list $project package --vulnerable --include-transitive --format json --no-restore
            if ($LASTEXITCODE -ne 0) {
              throw "NuGet vulnerability audit failed for $project."
            }
            if (($report -join "`n") -match '"advisoryUrl"\s*:') {
              $report | Write-Host
              throw "A vulnerable NuGet package was detected in $project."
            }
          }

      - name: Validate UI contract
        shell: pwsh
        run: .\Test-UiContract.ps1

      - name: Build with warnings as errors
        run: dotnet build .\FlareQuotes.App\FlareQuotes.App.csproj -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Run automated tests
        run: dotnet test .\FlareQuotes.Tests\FlareQuotes.Tests.csproj -c Release --no-restore --filter "FullyQualifiedName!~GmailEveryModelIntegrationTests"

      - name: Render and validate Windows UI snapshots
        shell: pwsh
        run: .\Test-UiSnapshots.ps1

      - name: Upload rendered UI review artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rendered-ui-${{ github.run_id }}
          path: artifacts/ui-snapshots
          if-no-files-found: warn
          retention-days: 14

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
